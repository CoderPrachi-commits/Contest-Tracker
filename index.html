<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contest Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <!-- header -->
    <div class="header">
      <h1>Contest Tracker</h1>
      <p>Never miss a coding contest</p>
    </div>

    <!-- filter buttons -->
    <div class="filter-section" id="filterBar"></div>

    <!-- upcoming contests -->
    <div class="section">
      <h2 class="section-title">
        Upcoming Contests
        <span class="count-badge" id="upcomingCount">0</span>
      </h2>
      <div class="card-grid" id="upcomingGrid"></div>
    </div>

    <!-- past contests -->
    <div class="section">
      <h2 class="section-title">
        Past Contests
        <span class="count-badge" id="pastCount">0</span>
      </h2>
      <div class="card-grid" id="pastGrid"></div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
